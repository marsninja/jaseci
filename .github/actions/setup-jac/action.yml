name: Set up jac binary
description: >
  Make the self-contained `jac` binary (Zig launcher + bundled CPython) available
  on PATH. Replaces `pip install -e ./jac`: jaclang ships as the binary, not a
  PyPI/editable package, so no system Python is needed to get the `jac` command.

  The binary is an OUTPUT cache keyed on the content that goes into it (jaclang
  source, build.zig, and the launcher -- including payload.zig, which pins the
  pbs tag / python version / bundled pip deps). The first job in any workflow on
  a branch to build it populates the cache; every other job and workflow restores
  the prebuilt binary in seconds instead of rebuilding. Exact-key match only
  (no restore-keys), so a stale binary can never be served -- which is why this
  is safe even though zig's own incremental cache stays disabled (it doesn't
  reliably invalidate on a jaclang/payload change).
runs:
  using: composite
  steps:
    # typeshed stdlib stubs are vendored as plain files now (no submodule);
    # third-party stubs are installed per-project by `jac add` (PEP 561 types-*).
    - name: Restore cached jac binary
      id: cache
      uses: actions/cache@v4
      with:
        # Also cache the gitignored typeshed stdlib stubs: they are materialized
        # during `zig build` and test-binary.yml publishes them as an artifact for
        # the compiler suite. Without them here, a binary cache hit skips the
        # build and the upload step fails on a fresh checkout.
        path: |
          jac/zig-out/bin/jac
          jac/jaclang/vendor/typeshed/stdlib
        key: jac-bin-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/jaclang/**', 'jac/build.zig', 'jac/launcher/**') }}

    - name: Restore cached typeshed stdlib stubs
      id: typeshed-cache
      uses: actions/cache@v4
      with:
        path: jac/jaclang/vendor/typeshed/stdlib
        key: typeshed-stdlib-${{ hashFiles('jac/jaclang/vendor/typeshed/PIN', 'jac/jaclang/vendor/typeshed/TARBALL_SHA256', 'jac/launcher/payload.zig') }}

    # Avoid re-downloading + re-decoding the ~600 MB python-build-standalone tree
    # on every binary-cache miss (the std zstd decode of the 122 MB archive is
    # slow): cache the extracted .pbs-build, keyed on the pbs pin (PBS_TAG /
    # PBS_PY / PBS_FLAVOR live in payload.zig). Only engaged on a binary miss
    # (when we actually build); a payload.zig edit re-fetches.
    - name: Restore cached python-build-standalone tree
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: jac/.pbs-build
        key: pbs-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/launcher/payload.zig') }}

    # The LLVMPY_* shim is the single most expensive build artifact (statically
    # links ~0.5 GB of LLVM archives; several minutes) and depends only on
    # native/**, build.zig, and the pinned slice (llvm_release.zig) -- NOT on
    # jaclang/**. Cache the built shim itself so compiler-only merges (the
    # common case for a binary-cache miss) skip both the LLVM fetch below and
    # the link: the build step passes the restored file via `-Dshim-bin`. The
    # cache path is the shim's in-tree place path, which a from-source build
    # populates, so a miss self-seeds when the job ends.
    - name: Restore cached LLVMPY shim
      id: shim-cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: jac/jaclang/compiler/passes/native/llvm/libjacllvm.*
        key: jac-shim-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/native/**', 'jac/build.zig', 'jac/launcher/llvm_release.zig') }}

    # The native (na) backend statically links a pinned LLVM into the LLVMPY_*
    # shim, so `zig build` needs that LLVM extracted first (there is no llvmlite
    # wheel anymore). Cache the pruned ~0.5 GB tree, keyed on payload.zig (which
    # pins the LLVM release via llvmRelease) -- mirrors the .pbs-build cache.
    # Only engaged on a binary miss AND a shim miss (a cached shim needs no LLVM
    # at all); a payload.zig edit re-fetches.
    - name: Restore cached LLVM (jacllvm shim deps)
      if: steps.cache.outputs.cache-hit != 'true' && steps.shim-cache.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: jac/.llvm-build
        key: llvm-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/launcher/payload.zig') }}

    # The contained bun runtime is fetched + sha256-verified and bundled into the
    # payload during `zig build`. Cache the extracted tree (~58 MB) so a binary
    # miss does not re-download it, keyed on payload.zig (BUN_VERSION lives there).
    # Only engaged on a binary miss; a payload.zig edit re-fetches.
    - name: Restore cached bun runtime
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: jac/.bun-build
        key: bun-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('jac/launcher/payload.zig') }}

    - name: Set up Zig 0.16.0
      if: steps.cache.outputs.cache-hit != 'true' || steps.typeshed-cache.outputs.cache-hit != 'true'
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0
        # We key our own output cache above; zig's incremental cache is unreliable
        # for the payload step, so leave it off and rebuild from scratch on a miss.
        use-cache: false

    # Download + extract the pinned LLVM into jac/.llvm-build (idempotent: a no-op
    # when the cache above restored it). Must run before `zig build` so the shim's
    # static archives exist when build.zig configures the jacllvm step. Skipped
    # entirely when a cached shim was restored (-Dshim-bin needs no LLVM).
    - name: Fetch LLVM for the jacllvm shim
      if: steps.cache.outputs.cache-hit != 'true' && steps.shim-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: jac
      run: zig build fetch-llvm --summary all

    - name: Fetch typeshed stdlib stubs
      if: steps.typeshed-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: jac
      run: zig build fetch-typeshed --summary all

    - name: Build the jac binary
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: jac
      # On a shim-cache hit, stage the restored shim OUTSIDE its in-tree place
      # path before passing it via -Dshim-bin: the build's place step copies
      # -Dshim-bin back to that path, and a self-copy would read the file it is
      # truncating. On a shim miss the plain build links it from source, the
      # place step writes it in-tree, and the shim cache saves it at job end.
      run: |
        SHIM_ARG=()
        if [ "${{ steps.shim-cache.outputs.cache-hit }}" = "true" ]; then
          mkdir -p .shim-build
          cp jaclang/compiler/passes/native/llvm/libjacllvm.* .shim-build/
          SHIM_ARG=(-Dshim-bin=".shim-build/$(ls .shim-build | head -1)")
        fi
        zig build "${SHIM_ARG[@]}" --summary all

    # Binary cache hits skip `zig build`, which is what normally runs fetch-typeshed.
    # Older cache entries only stored the binary, so materialize stubs when missing.
    - id: typeshed_check
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        if [ -f jac/jaclang/vendor/typeshed/stdlib/VERSIONS ]; then
          echo "needed=false" >> "$GITHUB_OUTPUT"
        else
          echo "needed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Zig 0.16.0 (for typeshed after binary cache hit)
      if: steps.cache.outputs.cache-hit == 'true' && steps.typeshed_check.outputs.needed == 'true'
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0
        use-cache: false

    - name: Materialize typeshed stdlib stubs
      if: steps.cache.outputs.cache-hit == 'true' && steps.typeshed_check.outputs.needed == 'true'
      shell: bash
      working-directory: jac
      run: zig build fetch-typeshed

    - name: Put jac on PATH
      shell: bash
      run: |
        mkdir -p "$HOME/.jacbin"
        ln -sf "$GITHUB_WORKSPACE/jac/zig-out/bin/jac" "$HOME/.jacbin/jac"
        echo "$HOME/.jacbin" >> "$GITHUB_PATH"
