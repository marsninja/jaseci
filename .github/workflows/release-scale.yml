name: Release jac-scale to PYPI

on: workflow_dispatch

jobs:
  release-scale:
    name: Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: jac-scale

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python 3.12, 3.13, 3.14
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13
            3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Pre-build admin dashboard UI
        run: |
          pip install -e ../jac
          jac install -e .
          jac run scripts/build_admin_ui.jac
          pip uninstall -y jac-scale

      - name: Install build tools
        run: pip install twine

      - name: Build and publish
        run: |
          jac bundle --precompile
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
