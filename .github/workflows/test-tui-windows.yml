name: Run tests for TUI Windows

# Native TUI port (top-level ai_tui_na/) — Windows coverage.
#
# Currently ONE active job:
#   windows-cross-compile  — Linux runner, builds tui.dll + jac-na-tui.exe +
#                            test_pickers.exe via nacompile --target windows,
#                            asserts PE/COFF format. Validates the compiler's PE
#                            backend handles this module's FFI shape (calloc'd
#                            INPUT_RECORD buffers, kernel32 imports) and uploads
#                            test_pickers.exe so a future run-only job can execute
#                            it on a Windows runner.
#
# The real-Windows-host native job is DEFERRED — see the NOTE at the bottom.
# jaclang now ships only as the `jac` binary, which has no Windows target
# (python-build-standalone ships no Windows pbs), so we can no longer run jaclang
# on a windows-latest runner. The path forward is cross-compile-on-Linux +
# run-only-on-Windows; it is parked until the base pipeline is proven.
#
# Toolchain: the self-contained `jac` binary (Zig launcher + bundled CPython),
# built via the setup-jac composite action — replaces `pip install -e ./jac`.

on:
  push:
    branches: [main]
    paths:
      - 'ai_tui_na/**'
      - '.github/workflows/test-tui-windows.yml'
      - '.github/actions/setup-jac/**'
  pull_request:
    branches: [main]
    paths:
      - 'ai_tui_na/**'
      - '.github/workflows/test-tui-windows.yml'
      - '.github/actions/setup-jac/**'
  workflow_dispatch:

jobs:
  # ── Linux cross-compile gate ────────────────────────────────────────────────
  # Build tui.dll, jac-na-tui.exe and test_pickers.exe targeting x86-64 Windows
  # PE/COFF on a Linux runner. Cannot run the output here, but `file` asserts
  # PE32+ format and a byte-check confirms the MZ magic — enough to validate the
  # PE codegen path for this module's FFI shape before any Windows runner.
  test-windows-cross-compile:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up jac (build the binary, cached)
        uses: ./.github/actions/setup-jac

      - name: Cross-compile NA TUI → Windows (--target windows)
        working-directory: ai_tui_na
        run: JAC_AI_TUI_TARGET=win32 bash build.sh --quick

      - name: Assert tui.dll is PE32+ (COFF)
        working-directory: ai_tui_na
        run: |
          FILE_OUT="$(file bin/tui.dll)"
          echo "file: $FILE_OUT"
          echo "$FILE_OUT" | grep -qiE "PE32\+|PE32" \
            || { echo "FAIL: tui.dll is not a PE/COFF file"; exit 1; }
          echo "ok: PE/COFF format confirmed"

      - name: Assert tui.dll has MZ magic
        working-directory: ai_tui_na
        run: |
          python3 -c "
          data = open('bin/tui.dll', 'rb').read(2)
          assert data == b'MZ', f'Expected MZ magic, got {data!r}'
          print('ok: MZ magic confirmed (PE/COFF)')
          "

      - name: Assert jac-na-tui.exe is PE32+
        working-directory: ai_tui_na
        run: |
          FILE_OUT="$(file bin/jac-na-tui.exe)"
          echo "file: $FILE_OUT"
          echo "$FILE_OUT" | grep -qiE "PE32\+|PE32" \
            || { echo "FAIL: jac-na-tui.exe is not a PE/COFF file"; exit 1; }
          echo "ok: jac-na-tui.exe is PE32+"

      - name: Cross-compile test_pickers.exe (headless picker logic)
        working-directory: ai_tui_na
        run: |
          # test_pickers imports `.libc_tty`; stage the win32 backend before
          # compiling (build.sh --quick already removed its staged copy).
          cp tty/console.win32.na.jac libc_tty.na.jac
          trap 'rm -f libc_tty.na.jac' EXIT
          jac nacompile test_pickers.na.jac --target windows -o bin/test_pickers.exe
          FILE_OUT="$(file bin/test_pickers.exe)"
          echo "file: $FILE_OUT"
          echo "$FILE_OUT" | grep -qiE "PE32\+|PE32" \
            || { echo "FAIL: test_pickers.exe is not a PE/COFF file"; exit 1; }
          echo "ok: test_pickers.exe is PE32+"

      - name: Upload Windows artifacts (for the future run-only Windows job)
        uses: actions/upload-artifact@v4
        with:
          name: tui-windows-binaries
          path: |
            ai_tui_na/bin/test_pickers.exe
            ai_tui_na/bin/jac-na-tui.exe
            ai_tui_na/bin/tui.dll
          retention-days: 7
          if-no-files-found: error

  # ── NOTE: real-Windows-host native job is DEFERRED ──────────────────────────
  # The previous `test-windows-native` job built AND ran the TUI on a
  # windows-latest runner via `pip install -e ./jac`. That is no longer possible:
  # jaclang ships only as the `jac` binary, which builds for Linux and macOS
  # (python-build-standalone has no Windows target — see build.zig osArchString /
  # launcher/fetch-pbs.sh), so there is no `jac` to install or run on Windows.
  #
  # The intended replacement does NOT need jaclang on Windows: cross-compile
  # test_pickers.exe on Linux (the job above already does this and uploads it),
  # then a windows-latest job downloads the artifact and runs the bare .exe —
  # no toolchain required to execute a self-contained native binary. The host
  # gate (test_host.jac) and Win32 console gate (test_console_win32.jac), which
  # DO run jaclang under CPython on Windows, stay parked until a Windows `jac`
  # binary exists (tracked upstream as a follow-up to #6855).
  #
  # This is parked deliberately until the Linux/macOS pipeline is proven green.
