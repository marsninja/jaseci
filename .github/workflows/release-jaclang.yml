name: Release jac native binary

# jaclang ships as a single self-contained `jac` binary (Zig launcher that
# dlopens a bundled CPython; no system Python, uv, or pip). This workflow builds
# that binary per platform and attaches it to the GitHub Release. jaclang is no
# longer published to PyPI -- the binary is the distribution.

on:
  # Called by publish-release.yml right after it cuts the release. This is the
  # primary path: a release created with GITHUB_TOKEN does not emit a
  # release.published event to other workflows (GitHub anti-recursion), so the
  # publisher invokes the build directly instead of relying on the event.
  workflow_call:
    inputs:
      tag:
        description: "Canonical release tag v<version> to upload assets to."
        required: true
        type: string
  # Safety net: a release published by a real user (e.g. via the UI) does emit
  # this event, so binaries still attach even outside the publish workflow.
  release:
    types: [published]
  # Manual re-attach of binaries to an existing release.
  workflow_dispatch:
    inputs:
      tag:
        # Use the canonical release tag `v<version>` (e.g. v0.30.1) so binaries
        # land on the release the publish pipeline already cut. Do NOT invent a
        # new tag (e.g. `jaclang-0.30.1`) -- that creates a duplicate release.
        # Empty = build the artifact only, attach nothing.
        description: "Canonical release tag to upload assets to (e.g. v0.30.1). Empty = artifact only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target so the smoke test runs on real hardware.
        # The launcher links only libc and dlopens libpython, so each build is
        # self-contained; build.zig fetches the per-target python-build-standalone
        # and (for the native backend) the per-target LLVM release.
        include:
          # zig_target pins each Linux binary's glibc floor regardless of the
          # runner's glibc, so the asset runs on that floor+. Both Linux legs are
          # floored at 2.17 (matching CPython/PBS manylinux2014): the launcher +
          # pyembed are zig pins, and the LLVMPY_* shim links its libc++ LLVM
          # slice with `zig c++` at the same 2.17 (build.zig linuxShim, #7082) --
          # a host-g++ link would force the runner's glibc instead (the shim, not
          # the launcher, is the floor). The verify step below asserts the floor
          # from this value. macOS omits zig_target and builds host-native.
          - os: ubuntu-latest
            platform: linux-x86_64
            zig_target: x86_64-linux-gnu.2.17
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            zig_target: aarch64-linux-gnu.2.17
          # No macos-x86_64 (Intel) leg: the native (na) backend statically links
          # a pinned LLVM release, and LLVM ships no macOS-x64 prebuilt for 20.1.8
          # (only Linux-X64/ARM64 + macOS-ARM64). Apple Silicon is covered by
          # macos-aarch64; restoring Intel-Mac needs an x86_64 LLVM static source.
          - os: macos-14
            platform: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      # Check out the release tag, not the caller's default SHA. A reusable
      # workflow (`uses:`) otherwise runs at the caller's ref, so a recovery
      # dispatch after `main` advanced would build binaries from newer source
      # and clobber them onto the old release -- source and assets would drift.
      # On a release event this is the published tag; empty (artifact-only
      # dispatch) falls through to the default ref.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Install host tools (zstd)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y zstd
          else
            brew install zstd
          fi

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # Fresh cache each run: build.zig's payload step doesn't reliably
          # invalidate on jaclang/ changes, so a cached payload could ship stale
          # bits in a release. Force a rebuild.
          use-cache: false

      - name: Read version (from jac.toml)
        id: ver
        working-directory: jac
        run: echo "version=$(grep -m1 '^version' jac.toml | sed -E 's/.*"([^"]+)".*/\1/')" >> "$GITHUB_OUTPUT"

      # The native (na) backend statically links a pinned LLVM into the LLVMPY_*
      # shim, so the per-target LLVM release must be extracted before `zig build`
      # (there is no llvmlite wheel anymore). One-time ~1.5-2 GB download; not
      # cached here, matching this workflow's fresh-each-release policy.
      - name: Fetch LLVM for the jacllvm shim
        working-directory: jac
        # zig_target -> -Dtarget=... on Linux legs; empty (host-native) on macOS.
        run: zig build fetch-llvm ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) }} --summary all

      - name: Build the jac binary (one command)
        working-directory: jac
        run: zig build ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) }} --summary all

      - name: Smoke test (no system Python)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" --version
          printf 'with entry { print("ok"); }\n' > "$WORK/h.jac"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/h.jac" | grep -q ok

      - name: Verify glibc floor (from zig_target)
        if: runner.os == 'Linux'
        working-directory: jac
        env:
          ZIG_TARGET: ${{ matrix.zig_target }}
        # Guards #7082: the shipped launcher and the LLVMPY_* shim must not reference
        # a glibc symbol newer than the advertised floor -- which is exactly the
        # matrix zig_target's suffix (x86_64-linux-gnu.2.17 -> 2.17), so there is no
        # second place to keep a floor number in sync. objdump -T lists each
        # undefined symbol's GLIBC_x.y version tag; assert the maximum is <= floor.
        run: |
          set -euxo pipefail
          FLOOR="${ZIG_TARGET##*gnu.}"
          check() {
            local f="$1" hi
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
            hi="$(objdump -T "$f" 2>/dev/null | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' | sed 's/GLIBC_//' | sort -V | tail -1)"
            : "${hi:=0}"
            echo "$f -> max GLIBC_$hi (floor $FLOOR)"
            if [ "$(printf '%s\n%s\n' "$FLOOR" "$hi" | sort -V | tail -1)" != "$FLOOR" ]; then
              echo "::error::$f requires GLIBC_$hi (> $FLOOR)"; exit 1
            fi
          }
          check zig-out/bin/jac
          # Materialize the shim as an install artifact if the build didn't place it.
          SHIM="jaclang/compiler/passes/native/llvm/libjacllvm.so"
          [ -f "$SHIM" ] || zig build jacllvm -Dtarget=${{ matrix.zig_target }} --summary all
          [ -f "$SHIM" ] || SHIM="zig-out/lib/libjacllvm.so"
          check "$SHIM"

      - name: Package asset (+ checksum)
        id: pkg
        working-directory: jac
        run: |
          set -euxo pipefail
          ASSET="jac-${{ steps.ver.outputs.version }}-${{ matrix.platform }}"
          mkdir -p dist
          cp zig-out/bin/jac "dist/$ASSET"
          # No codesign on macOS, deliberately: the binary is a Mach-O stub
          # with the payload tarball appended (launcher/pack.zig), and codesign
          # rejects any file with data past the Mach-O end ("main executable
          # failed strict validation") -- the old `codesign ... || true` here
          # failed on every run. The zig linker's ad-hoc signature on the stub
          # is content-based and survives cp, and the smoke test above already
          # executed these exact bytes on this runner.
          ( cd dist && shasum -a 256 "$ASSET" > "$ASSET.sha256" )
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: jac
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          [ -n "$TAG" ] || TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            "dist/${{ steps.pkg.outputs.asset }}" \
            "dist/${{ steps.pkg.outputs.asset }}.sha256" \
            --clobber

      # End-to-end check of the user-facing install path. Now that THIS
      # platform's asset is attached to the release, `scripts/install.sh` must be
      # able to resolve, download, checksum-verify, and run it. This is the gate
      # that catches release-tag/installer scheme drift (the kind that silently
      # breaks `curl ... | bash`) at release time, on the same native hardware
      # the asset targets, instead of in users' terminals. Gated like the upload
      # above -- only meaningful once the asset is actually on a release. Runs in
      # an isolated $HOME so the runner's PATH/profile is left untouched.
      - name: Verify install.sh can fetch + run this release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          JAC_VER: ${{ steps.ver.outputs.version }}
          ASSET: ${{ steps.pkg.outputs.asset }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail
          TAG="${{ inputs.tag }}"
          [ -n "$TAG" ] || TAG="${{ github.event.release.tag_name }}"

          # The GitHub API lists release assets with a few seconds of lag after an
          # upload, and install.sh resolves the binary from that listing. Wait for
          # this platform's asset to appear before verifying.
          echo "Waiting for asset $ASSET to appear on release $TAG..."
          deadline=$(( SECONDS + 120 ))
          until gh release view "$TAG" --json assets \
                  --jq '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::$ASSET did not appear on release $TAG within 120s"
              exit 1
            fi
            sleep 5
          done
          echo "Asset $ASSET is visible; verifying install path."

          HOME="$(mktemp -d)"; export HOME
          bash scripts/install.sh --version "$JAC_VER"
          BIN="$HOME/.local/bin/jac"
          test -x "$BIN"
          "$BIN" --version
          printf 'with entry { print("installed ok"); }\n' > "$HOME/h.jac"
          "$BIN" run "$HOME/h.jac" | grep -q "installed ok"
          bash scripts/install.sh --uninstall
          ! test -e "$BIN"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: jac/dist/*
