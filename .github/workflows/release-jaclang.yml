name: Release jac native binary

# jaclang ships as a single self-contained `jac` binary (Zig launcher that
# dlopens a bundled CPython; no system Python, uv, or pip). This workflow builds
# that binary per platform and attaches it to the GitHub Release. jaclang is no
# longer published to PyPI -- the binary is the distribution.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. jaclang-0.16.7). Empty = artifact only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target so the smoke test runs on real hardware.
        # The launcher links only libc and dlopens libpython, so each build is
        # self-contained; build.zig fetches the per-target python-build-standalone.
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-13
            platform: macos-x86_64
          - os: macos-14
            platform: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host tools (zstd)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y zstd
          else
            brew install zstd
          fi

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # Fresh cache each run: build.zig's payload step doesn't reliably
          # invalidate on jaclang/ changes, so a cached payload could ship stale
          # bits in a release. Force a rebuild.
          use-cache: false

      - name: Read version (from jac.toml)
        id: ver
        working-directory: jac
        run: echo "version=$(grep -m1 '^version' jac.toml | sed -E 's/.*"([^"]+)".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Build the jac binary (one command)
        working-directory: jac
        run: zig build --summary all

      - name: Smoke test (no system Python)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" --version
          printf 'with entry { print("ok"); }\n' > "$WORK/h.jac"
          env -i HOME="$WORK" PATH=/usr/bin:/bin "$BIN" run "$WORK/h.jac" | grep -q ok

      - name: Package asset (+ checksum, ad-hoc codesign on macOS)
        id: pkg
        working-directory: jac
        run: |
          set -euxo pipefail
          ASSET="jac-${{ steps.ver.outputs.version }}-${{ matrix.platform }}"
          mkdir -p dist
          cp zig-out/bin/jac "dist/$ASSET"
          if [ "$RUNNER_OS" = "macOS" ]; then codesign --force --sign - "dist/$ASSET" || true; fi
          ( cd dist && shasum -a 256 "$ASSET" > "$ASSET.sha256" )
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: jac
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          [ -n "$TAG" ] || TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            "dist/${{ steps.pkg.outputs.asset }}" \
            "dist/${{ steps.pkg.outputs.asset }}.sha256" \
            --clobber

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: jac/dist/*
