name: K8s Microservice Real E2E

# Real-app e2e: builds the fixture image, deploys via the microservice
# K8s pipeline against microk8s, verifies pods + gateway routing,
# rolling-restart + hammer-for-non-2xx.

on:
  workflow_dispatch:
  pull_request:

jobs:
  real-e2e:
    name: microk8s real-app smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jaclang + jac-scale[deploy]
        run: |
          pip install --upgrade pip
          pip install -e jac
          jac install -e jac-scale --extras deploy

      - name: Set up microk8s
        run: |
          sudo snap install microk8s --classic --channel=1.30/stable
          sudo microk8s status --wait-ready --timeout 180
          sudo usermod -aG microk8s "$USER"
          mkdir -p "$HOME/.kube"
          sudo microk8s config | sudo tee "$HOME/.kube/config" >/dev/null
          sudo chown "$USER" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pre-pull + enable addons (best-effort)
        # registry.k8s.io has been flaky on GHA. Pre-pulling via
        # containerd directly lets us retry without restarting the
        # kubelet's image-pull state machine.
        continue-on-error: true
        run: |
          for img in registry.k8s.io/metrics-server/metrics-server:v0.7.2 \
                     registry.k8s.io/ingress-nginx/controller:v1.10.1; do
            for _ in 1 2 3; do sudo microk8s ctr images pull "$img" && break; sleep 5; done
          done
          sudo microk8s enable metrics-server || echo "WARN: metrics-server enable failed"
          sudo microk8s enable ingress || echo "WARN: ingress enable failed"
          kubectl wait --namespace ingress --for=condition=ready pod \
              --selector=name=nginx-ingress-microk8s --timeout=180s \
              || echo "WARN: ingress controller not ready; K10 path will skip"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore BuildKit cache (pip wheels + apt downloads)
        # Exact-key only. Broad restore-keys (`buildkit-${os}-`) can pull
        # stale layer cache from other PRs and BuildKit reuses the cached
        # COPY layer even when the new source tree disagrees.
        uses: actions/cache@v4
        with:
          path: /tmp/buildkit-cache
          key: buildkit-${{ runner.os }}-${{ hashFiles('jac/pyproject.toml', 'jac-scale/pyproject.toml', 'jac-scale/scripts/Dockerfile.microservice.exp') }}

      - name: Show cluster info
        run: |
          kubectl version
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Run K8s microservice real-app e2e
        env:
          CLUSTER_TYPE: microk8s
          BUILDX_CACHE_DIR: /tmp/buildkit-cache
        run: |
          bash jac-scale/scripts/k8s_microservice_real_e2e.sh \
              jac-scale/jac_scale/tests/fixtures/k8s_e2e

      - name: Dump kubectl state on failure
        if: failure()
        run: |
          echo "=== events ==="
          kubectl get events --sort-by='.lastTimestamp' --all-namespaces || true
          echo "=== pods ==="
          kubectl get pods -A -o wide || true
          echo "=== describe pods (jac-e2e ns) ==="
          kubectl describe pods -n jac-e2e || true
          echo "=== gateway logs ==="
          kubectl logs -n jac-e2e -l app=gateway --tail=100 || true
          echo "=== service-app logs (sample) ==="
          for app in cart-app orders-app products-app; do
              echo "--- $app ---"
              kubectl logs -n jac-e2e -l app=$app --tail=50 || true
          done
          echo "=== ingress status ==="
          kubectl describe ingress -n jac-e2e || true
          echo "=== ingress controller logs ==="
          kubectl logs -n ingress -l name=nginx-ingress-microk8s --tail=50 || true
