name: Release jac-mcp to PYPI

on: workflow_dispatch

jobs:
  release-mcp:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: jac-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python 3.12 (for twine upload)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install jac-mcp (jaclang is host-provided by the binary)
        run: jac install -e .

      - name: Bundle documentation
        run: jac run scripts/bundle_docs.jac

      - name: Install build tools
        run: pip install twine

      - name: Build and publish
        run: |
          jac bundle
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
