name: jac single-binary self-test

# Builds the self-contained `jac` binary ONCE (one `zig build` via setup-jac:
# fetch pbs, assemble the payload, pack it onto the launcher stub), smoke-tests
# it hermetically, then fans the FULL repo suite out across two jobs that run the
# binary's own runner (`jac test` -> bundled pytest + xdist) in parallel:
# compiler vs everything-else. This is the jaclang test gate: it replaces the
# editable `pip install -e jac` + pytest jobs (test-core-compiler /
# test-core-runtime). The build job uploads the 49 MB binary as an artifact so
# the two test jobs reuse it instead of each rebuilding (~25 min of duplicate
# build work eliminated). Runs on 4-vCPU runners so `-n auto` spins up ~4 xdist
# workers per job instead of ~2 on a free runner.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]

permissions:
  contents: read

# This workflow tests the SHIPPED binary's bundled + precompiled jaclang. The
# checkout's jac.toml files (root and jac/) carry a `[dev] jaclang_source` stanza
# for the local editable dev loop, which `_jac_finder` would otherwise pick up
# (working-directory: jac -> nearest is jac/jac.toml) and use to reroute `import
# jaclang` to the source tree (skipping the precompiled JIR bundle). Force the
# dev loop OFF so the binary under test is the real artifact. (The hermetic
# `env -i` smoke steps below clear the environment, so they set this inline
# instead of inheriting it from here.)
env:
  JAC_NO_DEV_SOURCE: "1"

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      # typeshed stdlib stubs are now vendored as plain files (no submodule);
      # third-party stubs are installed per-project by `jac add`.
      - uses: actions/checkout@v4

      - name: Set up jac (build the binary once, cached)
        uses: ./.github/actions/setup-jac

      # setup-jac only runs `zig build` (which fetches the gitignored typeshed
      # stdlib stubs into the checkout) on a binary-cache MISS. On a cache HIT
      # the prebuilt binary is restored and the build -- and the stub fetch with
      # it -- is skipped, so the stubs the upload step below publishes for
      # test-compiler are absent (the upload then hard-fails on if-no-files-found).
      # `zig build fetch-typeshed` is a lightweight, idempotent fetch (builds the
      # small payload tool, no binary build, no LLVM/pbs) that materializes them
      # regardless of the cache outcome; on a miss it is a no-op (stamp check).
      - name: Set up Zig 0.16.0 (for the typeshed fetch on a binary-cache hit)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: false

      - name: Materialize typeshed stdlib stubs into the checkout
        working-directory: jac
        run: zig build fetch-typeshed --summary all

      - name: Hermeticity + smoke (no system Python)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          # glibc-only / no libpython at link time
          ldd "$BIN" || true
          ! ldd "$BIN" | grep -qi python
          WORK="$(mktemp -d)"
          printf 'obj P { has x:int=0; def sq->int { return self.x*self.x; } }\nwith entry { print(P(x=7).sq()); }\n' > "$WORK/obj.jac"
          env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_NO_DEV_SOURCE=1 "$BIN" --version
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_NO_DEV_SOURCE=1 "$BIN" run "$WORK/obj.jac")"
          echo "$out" | grep -q 49

      - name: Run real jac programs (end-to-end execution)
        working-directory: jac
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"; cd "$WORK"
          # obj + methods + comprehension
          cat > a.jac <<'JAC'
          obj Point { has x: int; has y: int; def dist -> float { return (self.x*self.x + self.y*self.y) ** 0.5; } }
          with entry {
              p = Point(x=3, y=4);
              print("dist", p.dist());
              print([i*i for i in range(5)]);
          }
          JAC
          out="$(env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_NO_DEV_SOURCE=1 "$BIN" run "$WORK/a.jac")"
          echo "$out" | grep -q "dist 5.0"
          echo "$out" | grep -q "0, 1, 4, 9, 16"

      - name: jac test runner (self-contained test file)
        working-directory: jac
        # Blocking smoke check: the binary's test runner (pytest collection +
        # execution via the bundled pytest) works on a self-contained `.jac`
        # test under a fully hermetic env (no system Python, minimal PATH).
        run: |
          set -euxo pipefail
          BIN="$PWD/zig-out/bin/jac"
          WORK="$(mktemp -d)"
          cat > "$WORK/test_smoke.jac" <<'JAC'
          test "arithmetic" { assert 6 * 7 == 42; }
          test "comprehension" { assert [i for i in range(3)] == [0, 1, 2]; }
          test "strings" { assert "ja" + "c" == "jac"; }
          JAC
          env -i HOME="$WORK" PATH=/usr/bin:/bin JAC_TEST_JOBS=0 JAC_NO_DEV_SOURCE=1 "$BIN" test "$WORK/test_smoke.jac"

      - name: Upload the jac binary
        uses: actions/upload-artifact@v4
        with:
          name: jac-binary
          path: jac/zig-out/bin/jac
          retention-days: 1
          if-no-files-found: error

      # The fetch-typeshed step above materialized the gitignored typeshed stdlib
      # stubs into the checkout (on both a binary-cache hit and miss); publish
      # them so the test jobs get them without a zig toolchain (they only
      # download the prebuilt binary).
      - name: Upload typeshed stdlib stubs
        uses: actions/upload-artifact@v4
        with:
          name: typeshed-stdlib
          path: jac/jaclang/vendor/typeshed/stdlib
          retention-days: 1
          if-no-files-found: error

  # Compiler half of the suite (was test-core-compiler). Runs in parallel with
  # test-runtime against the same prebuilt binary.
  test-compiler:
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Restore typeshed stdlib stubs into the checkout
        # The nacompile subprocess tests shell out to `<jac> -m jaclang`, which
        # (via -m's cwd-prepend, working-directory: jac) resolves the IN-TREE
        # jaclang and loads jac/jaclang/vendor/typeshed/stdlib for native type
        # resolution. Those stubs are gitignored now (fetched at the pinned
        # commit, not committed); the build job published them as an artifact so
        # this job needs no zig toolchain. Without them na-compilation fails.
        uses: actions/download-artifact@v4
        with:
          name: typeshed-stdlib
          path: jac/jaclang/vendor/typeshed/stdlib
      - name: Download the jac binary
        uses: actions/download-artifact@v4
        with:
          name: jac-binary
          path: bin
      - name: Put jac on PATH
        # upload-artifact strips the executable bit; restore it and expose `jac`
        # so subprocess tests that shell out to `["jac", ...]` resolve this binary.
        run: |
          chmod +x "$PWD/bin/jac"
          echo "$PWD/bin" >> "$GITHUB_PATH"
      # Self-contained nacompile tests static-link against a vendored musl
      # runtime; the in-tree (dev-mode) nacompile resolves it from
      # .pbs-build/<arch>/musl/lib, so harvest it from the bundled Zig here.
      - name: Set up Zig 0.16.0 (vendor static-musl runtime)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: false
      - name: Vendor static-musl runtime
        working-directory: jac
        run: zig build vendor-musl --summary all
      - name: Compiler suite via the binary
        working-directory: jac
        run: |
          set -uxo pipefail
          WORK="$(mktemp -d)"
          rc=0
          HOME="$WORK" JAC_TEST_JOBS=auto jac test tests/compiler | tee /tmp/compiler.log || rc=$?
          {
            echo "## binary compiler-suite result"
            echo '```'
            grep -E '^(FAILED|ERROR)|passed|failed' /tmp/compiler.log | tail -60 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"

  # Everything except the compiler tests (was test-core-runtime). Runs in parallel
  # with test-compiler against the same prebuilt binary.
  test-runtime:
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Download the jac binary
        uses: actions/download-artifact@v4
        with:
          name: jac-binary
          path: bin
      - name: Put jac on PATH
        run: |
          chmod +x "$PWD/bin/jac"
          echo "$PWD/bin" >> "$GITHUB_PATH"
      # Toolchains the runtime suite shells out to: JS backend tests need node/bun;
      # native-link tests need a C compiler (gcc ships on the runner).
      - name: Set up Node.js (JS backend tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Bun (JS backend tests)
        uses: oven-sh/setup-bun@v2
      # Self-contained nacompile tests static-link against a vendored musl
      # runtime, resolved in dev mode from .pbs-build/<arch>/musl/lib.
      - name: Set up Zig 0.16.0 (vendor static-musl runtime)
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          use-cache: false
      - name: Vendor static-musl runtime
        working-directory: jac
        run: zig build vendor-musl --summary all
      - name: Runtime suite via the binary (everything except compiler)
        working-directory: jac
        run: |
          set -uxo pipefail
          WORK="$(mktemp -d)"
          rc=0
          HOME="$WORK" JAC_TEST_JOBS=auto jac test tests/ --ignore tests/compiler | tee /tmp/runtime.log || rc=$?
          {
            echo "## binary runtime-suite result"
            echo '```'
            grep -E '^(FAILED|ERROR)|passed|failed' /tmp/runtime.log | tail -60 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"
