name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-publish: if the auto-trigger run failed partway (e.g. a build
  # error after the release/* PR was already merged), re-fire publishing for
  # selected packages. Versions are read from each package's manifest on the
  # current ref - no need to re-merge a release/* PR. Tier ordering and the
  # "already on PyPI" skip still apply, so re-running is safe.
  workflow_dispatch:
    inputs:
      jaclang:
        description: "Publish jaclang"
        type: boolean
        default: false
      jac-byllm:
        description: "Publish jac-byllm (byllm)"
        type: boolean
        default: false
      jac-scale:
        description: "Publish jac-scale"
        type: boolean
        default: false
      jac-mcp:
        description: "Publish jac-mcp"
        type: boolean
        default: false
      jaseci:
        description: "Publish jaseci meta-package"
        type: boolean
        default: false

permissions: {}

jobs:
  # ============================================================================
  # Parse release info from merged PR
  # ============================================================================
  parse-release:
    if: |
      github.repository == 'Jaseci-Labs/jaseci' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has_releases: ${{ steps.parse.outputs.has_releases }}
      matrix: ${{ steps.parse.outputs.matrix }}
      release_summary: ${{ steps.parse.outputs.release_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jaclang
        run: pip install -e ./jac

      - name: Parse release info
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          # Collect the checked packages (empty string when unchecked).
          IN_JACLANG: ${{ inputs.jaclang && 'jaclang' || '' }}
          IN_BYLLM: ${{ inputs['jac-byllm'] && 'jac-byllm' || '' }}
          IN_SCALE: ${{ inputs['jac-scale'] && 'jac-scale' || '' }}
          IN_MCP: ${{ inputs['jac-mcp'] && 'jac-mcp' || '' }}
          IN_JASECI: ${{ inputs.jaseci && 'jaseci' || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PACKAGES="$IN_JACLANG $IN_BYLLM $IN_SCALE $IN_MCP $IN_JASECI"
            echo "Manual dispatch - selected packages: $PACKAGES"
            jac run scripts/parse_release.jac --packages "$PACKAGES"
          else
            jac run scripts/parse_release.jac --pr-title "$PR_TITLE"
          fi

  # ============================================================================
  # Approval gate - ONE click to approve all publishing
  # ============================================================================
  approve-release:
    needs: parse-release
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 60
    steps:
      - name: Approval granted
        env:
          SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
        run: |
          echo "Release approved: $SUMMARY"
          echo "Proceeding with publish..."

  # ============================================================================
  # Build packages
  # ============================================================================
  build:
    needs: [parse-release, approve-release]
    if: |
      needs.parse-release.outputs.has_releases == 'true' &&
      needs.approve-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: ${{ matrix.submodules }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Set up additional Python versions needed for precompile (both plugins and jaclang itself).
      - name: Set up Python 3.13 (for precompile)
        if: matrix.precompile == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Python 3.14 (for precompile)
        if: matrix.precompile == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Install jaclang for plugin builds (jac bundle) and for any extra build commands.
      # jaclang itself uses python -m build, so it doesn't need this step.
      - name: Install jaclang
        if: matrix.name != 'jaclang'
        run: pip install -e ./jac

      # Install the package itself for extra build commands.
      # Plugins have no pyproject.toml (jac.toml is the source of truth), so use `jac install`.
      - name: Install package (for build commands)
        if: matrix.extra_build_cmd != '' && matrix.name != 'jaclang'
        run: jac install -e ./${{ matrix.dir }}

      # Install extra pip dependencies for build commands (a sibling plugin a build step needs)
      - name: Install extra build dependencies
        if: matrix.extra_build_deps != ''
        run: jac install -e ./${{ matrix.extra_build_deps }}

      # Set up Node.js for packages that need it (e.g., admin UI build)
      - name: Set up Node.js (for client builds)
        if: matrix.needs_nodejs == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun (for client builds)
        if: matrix.needs_nodejs == true
        uses: oven-sh/setup-bun@v2

      # Run extra build commands (e.g., bundle_docs for jac-mcp, build_admin_ui for jac-scale)
      - name: Run extra build commands
        if: matrix.extra_build_cmd != ''
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.extra_build_cmd }}

      # Build the package.
      # jaclang uses python -m build (it bootstraps the toolchain and has no jac.toml).
      # All other packages use `jac bundle`, which reads jac.toml as source of truth.
      - name: Install build tools (jaclang)
        if: matrix.name == 'jaclang'
        run: pip install build

      # Precompile jaclang bytecode before python -m build packages it.
      # Uses per-version venvs (same pattern as jac bundle --precompile) since jaclang
      # bootstraps the toolchain and cannot use jac bundle itself.
      - name: Precompile jaclang bytecode
        if: matrix.name == 'jaclang' && matrix.precompile == true
        run: |
          for pyexe in python3.12 python3.13 python3.14; do
            if command -v "$pyexe" > /dev/null 2>&1; then
              "$pyexe" -m venv /tmp/jac-precompile-$pyexe
              /tmp/jac-precompile-$pyexe/bin/pip install -e ./jac --quiet
              /tmp/jac-precompile-$pyexe/bin/jac run jac/jaclang/utils/precompile_bytecode.jac ./jac
            else
              echo "Warning: $pyexe not found on PATH, skipping"
            fi
          done

      - name: Build jaclang wheel
        if: matrix.name == 'jaclang'
        working-directory: ${{ matrix.dir }}
        run: python -m build

      # Plugins precompile against jaclang from the local source tree, not PyPI:
      # this build runs before the freshly-bumped jaclang version is published.
      - name: Build plugin wheel
        if: matrix.name != 'jaclang'
        working-directory: ${{ matrix.dir }}
        env:
          JAC_PRECOMPILE_LOCAL_INSTALL: ${{ github.workspace }}/jac
          # Precompile a sibling plugin from local source so its not-yet-published
          # version pin resolves without PyPI.
          JAC_PRECOMPILE_LOCAL_DEPS: ${{ matrix.extra_build_deps != '' && format('{0}/{1}', github.workspace, matrix.extra_build_deps) || '' }}
        run: jac bundle ${{ matrix.precompile == true && '--precompile' || '' }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: ${{ matrix.dir }}/dist/*

  # ============================================================================
  # Publish npm packages (npmjs.org) - independent of the PyPI tiers.
  # A package opts in with an [npm] section in its jac.toml; the Jac client
  # runtime (@jaseci/runtime) is published alongside jaclang so JSX/component
  # packages have a runtime dependency to resolve against.
  # ============================================================================
  publish-npm:
    needs: [parse-release, build]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Decide what npm work (if any) this matrix entry implies:
      #   runtime -> this is jaclang, also publish @jaseci/runtime
      #   pkg     -> this package's jac.toml has an [npm] section (opt-in)
      - name: Determine npm work
        id: npm
        run: |
          RUNTIME=false; PKG=false
          if [ "${{ matrix.name }}" = "jaclang" ]; then RUNTIME=true; fi
          if [ -f "${{ matrix.dir }}/jac.toml" ] && grep -qE '^\[npm\]' "${{ matrix.dir }}/jac.toml"; then PKG=true; fi
          ANY=false; if [ "$RUNTIME" = "true" ] || [ "$PKG" = "true" ]; then ANY=true; fi
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "any=$ANY" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.npm.outputs.any == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        if: steps.npm.outputs.any == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install jaclang
        if: steps.npm.outputs.any == 'true'
        run: pip install -e ./jac

      # Publish @jaseci/runtime (versioned to the jaclang release).
      - name: Build and publish @jaseci/runtime
        if: steps.npm.outputs.runtime == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          jac bundle --target npm-runtime -o dist-runtime
          npm publish dist-runtime/jaseci-runtime-*.tgz --access public

      # Publish an opt-in package's npm tarball.
      - name: Build and publish npm package
        if: steps.npm.outputs.pkg == 'true'
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          jac bundle --target npm
          npm publish dist/*.tgz --access public

  # ============================================================================
  # Publish Tier 1: jaclang (base package)
  # ============================================================================
  publish-tier1:
    needs: [parse-release, build]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 1
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "1" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier1:
    needs: [parse-release, publish-tier1]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jaclang
        run: pip install -e ./jac

      - name: Wait for tier 1 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 1

  # ============================================================================
  # Publish Tier 2: packages depending on jaclang
  # ============================================================================
  publish-tier2:
    needs: [parse-release, build, wait-tier1]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 2
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "2" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier2:
    needs: [parse-release, publish-tier2]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jaclang
        run: pip install -e ./jac

      - name: Wait for tier 2 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 2

  # ============================================================================
  # Publish Tier 3: plugins that depend on a tier-2 plugin (currently none)
  # ============================================================================
  publish-tier3:
    needs: [parse-release, build, wait-tier2]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 3
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "3" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier3:
    needs: [parse-release, publish-tier3]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jaclang
        run: pip install -e ./jac

      - name: Wait for tier 3 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 3

  # ============================================================================
  # Publish Tier 4: jaseci meta-package (depends on everything above)
  # ============================================================================
  publish-tier4:
    needs: [parse-release, build, wait-tier3]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 4
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "4" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier4:
    needs: [parse-release, publish-tier4]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jaclang
        run: pip install -e ./jac

      - name: Wait for tier 4 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 4

  # ============================================================================
  # Push tags after successful publish
  # ============================================================================
  push-tags:
    needs: [parse-release, publish-tier1, publish-tier2, publish-tier3, publish-tier4]
    if: |
      always() &&
      needs.parse-release.outputs.has_releases == 'true' &&
      (needs.publish-tier1.result == 'success' || needs.publish-tier2.result == 'success' || needs.publish-tier3.result == 'success' || needs.publish-tier4.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      jaseci_version: ${{ steps.tags.outputs.jaseci_version }}
      jaseci_release_tag: ${{ steps.tags.outputs.jaseci_release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push tags
        id: tags
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
          TIER1_RESULT: ${{ needs.publish-tier1.result }}
          TIER2_RESULT: ${{ needs.publish-tier2.result }}
          TIER3_RESULT: ${{ needs.publish-tier3.result }}
          TIER4_RESULT: ${{ needs.publish-tier4.result }}
        run: |
          echo "$MATRIX" | jq -c '.include[]' | while read -r pkg; do
            pypi_name=$(echo "$pkg" | jq -r '.pypi')
            version=$(echo "$pkg" | jq -r '.version')
            tier=$(echo "$pkg" | jq -r '.tier')

            case "$tier" in
              1) result="$TIER1_RESULT" ;;
              2) result="$TIER2_RESULT" ;;
              3) result="$TIER3_RESULT" ;;
              4) result="$TIER4_RESULT" ;;
            esac

            if [[ "$result" == "success" ]]; then
              tag="${pypi_name}-v${version}"
              echo "Creating tag: $tag"
              git tag --annotate --message="Release ${pypi_name} ${version}" "$tag" "$GITHUB_SHA"
              git push origin "$tag"

              # For jaseci, also create v{version} tag for backwards compatibility
              # This is the primary release tag used for GitHub releases and standalone binaries
              if [[ "$pypi_name" == "jaseci" ]]; then
                vtag="v${version}"
                echo "Creating primary release tag: $vtag"
                git tag --annotate --message="Jaseci ${version}" "$vtag" "$GITHUB_SHA"
                git push origin "$vtag"
                echo "jaseci_version=$version" >> "$GITHUB_OUTPUT"
                echo "jaseci_release_tag=$vtag" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "Skipping tag for $pypi_name (tier $tier result: $result)"
            fi
          done

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-github-release:
    needs: [parse-release, push-tags]
    if: always() && needs.push-tags.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: Packages-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
          RELEASE_SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
          JASECI_RELEASE_TAG: ${{ needs.push-tags.outputs.jaseci_release_tag }}
        run: |
          # Use jaseci's v{version} tag if jaseci was released, otherwise first package's tag
          if [[ -n "$JASECI_RELEASE_TAG" ]]; then
            PRIMARY_TAG="$JASECI_RELEASE_TAG"
          else
            PRIMARY_TAG=$(echo "$MATRIX" | jq -r '.include[0] | "\(.pypi)-v\(.version)"')
          fi

          # Build release notes
          {
            echo "## Packages Released"
            echo ""
            while read -r pkg; do
              pypi_name=$(echo "$pkg" | jq -r '.pypi')
              version=$(echo "$pkg" | jq -r '.version')
              echo "- **${pypi_name}** ${version} ([PyPI](https://pypi.org/project/${pypi_name}/${version}/))"
            done < <(echo "$MATRIX" | jq -c '.include[]')
          } > release_notes.md

          # Create release
          gh release create "$PRIMARY_TAG" \
            --verify-tag \
            --title "Release: $RELEASE_SUMMARY" \
            --notes-file release_notes.md \
            dist/*

  # ============================================================================
  # Build standalone binaries (triggered when jaseci is released)
  # ============================================================================
  build-standalone-binaries:
    needs: [parse-release, wait-tier4, push-tags, create-github-release]
    if: |
      always() &&
      needs.wait-tier4.result == 'success' &&
      needs.push-tags.result == 'success' &&
      needs.push-tags.outputs.jaseci_version != ''
    uses: ./.github/workflows/build-standalone.yml
    with:
      jaseci_version: ${{ needs.push-tags.outputs.jaseci_version }}
      release_tag: ${{ needs.push-tags.outputs.jaseci_release_tag }}
    permissions:
      contents: write

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    needs: [parse-release, build, publish-tier1, publish-tier2, publish-tier3, publish-tier4, wait-tier3, wait-tier4, push-tags, create-github-release, build-standalone-binaries]
    if: always() && needs.parse-release.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Release Summary
        env:
          SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
          BUILD: ${{ needs.build.result }}
          TIER1: ${{ needs.publish-tier1.result }}
          TIER2: ${{ needs.publish-tier2.result }}
          TIER3: ${{ needs.publish-tier3.result }}
          TAGS: ${{ needs.push-tags.result }}
          RELEASE: ${{ needs.create-github-release.result }}
          STANDALONE: ${{ needs.build-standalone-binaries.result }}
          JASECI_VERSION: ${{ needs.push-tags.outputs.jaseci_version }}
        run: |
          {
            echo "## Release Summary: $SUMMARY"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Build | $BUILD |"
            echo "| Publish Tier 1 (jaclang) | $TIER1 |"
            echo "| Publish Tier 2 (plugins) | $TIER2 |"
            echo "| Publish Tier 3 (jaseci) | $TIER3 |"
            echo "| Push Tags | $TAGS |"
            echo "| GitHub Release | $RELEASE |"
            if [[ -n "$JASECI_VERSION" ]]; then
              echo "| Standalone Binaries | $STANDALONE |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$TIER1" == "failure" || "$TIER2" == "failure" || "$TIER3" == "failure" ]]; then
            echo "::error::Some packages failed to publish"
            exit 1
          fi

          echo "All packages published successfully!" >> "$GITHUB_STEP_SUMMARY"
