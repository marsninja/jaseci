name: Publish Release

# A release is: tag v<version>, cut the GitHub Release, then build and attach the
# native `jac` binaries. jaclang ships as that binary (not PyPI), so there is
# nothing else to publish. The binary build is invoked directly (not via the
# release.published event, which GITHUB_TOKEN cannot fire into other workflows).

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Recovery entry point. The version comes from jac/jac.toml and every step is
  # idempotent, so re-firing after a partial run is always safe.
  workflow_dispatch:

permissions: {}

jobs:
  resolve:
    if: |
      github.repository == 'Jaseci-Labs/jaseci' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/')
        )
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      summary: ${{ steps.ver.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # jac/jac.toml is the source of truth for the jaclang version.
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version' jac/jac.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from jac/jac.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "summary=jaclang $VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"

  # One-click approval gate before anything outward-facing happens. The
  # environment exists only for its required-reviewers protection; nothing is
  # deployed to it (and nothing is published to PyPI anywhere in this repo).
  approve:
    needs: resolve
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release-approval
    timeout-minutes: 60
    steps:
      # Fail closed if the gate is toothless: referencing a nonexistent
      # environment makes GitHub auto-create it with NO protection rules, so a
      # merge that lands before the environment is configured would let this job
      # run with no human review at all -- silently. Refuse to proceed unless
      # required reviewers are actually configured (public repo, so the
      # unauthenticated API suffices).
      - name: Verify the gate has required reviewers
        run: |
          set -euo pipefail
          rules="$(curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/release-approval" \
            | jq '[.protection_rules[]? | select(.type=="required_reviewers")] | length')"
          if [ "${rules:-0}" -eq 0 ]; then
            echo "::error::The release-approval environment has no required reviewers configured; refusing to release without a human gate. Configure reviewers on the environment (Settings -> Environments) and re-run."
            exit 1
          fi
          echo "release-approval has required reviewers; gate is real."

      - name: Approval granted
        env:
          SUMMARY: ${{ needs.resolve.outputs.summary }}
        run: |
          echo "Release approved: $SUMMARY"

  # Tag and cut the release. Both steps are idempotent so a re-run converges
  # instead of erroring on already-existing state.
  tag-and-release:
    needs: [resolve, approve]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Create the tag at this commit if it does not exist. If it already exists
      # (a recovery re-run), leave it where it is: moving it would repoint a
      # published release at a newer commit than its assets and notes describe.
      - name: Create and push tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          VTAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${VTAG}" >/dev/null 2>&1; then
            echo "Tag ${VTAG} already exists; leaving it in place."
          else
            echo "Tagging ${VTAG} at ${GITHUB_SHA}"
            git tag --annotate --message="jaclang ${VERSION}" "$VTAG" "$GITHUB_SHA"
            git push origin "refs/tags/${VTAG}"
          fi

      # Create the release, or update it in place if it already exists. Either
      # way it ends up published and marked latest.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.resolve.outputs.version }}
          SUMMARY: ${{ needs.resolve.outputs.summary }}
        run: |
          set -euo pipefail
          VTAG="v${VERSION}"

          {
            echo "## jaclang ${VERSION} (native \`jac\` binary)"
            echo ""
            echo "Install: \`curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash\`"
          } > release_notes.md

          if gh release view "$VTAG" >/dev/null 2>&1; then
            echo "Release $VTAG exists; updating in place."
            gh release edit "$VTAG" \
              --verify-tag \
              --latest \
              --title "Release: $SUMMARY" \
              --notes-file release_notes.md
          else
            echo "Creating release $VTAG."
            gh release create "$VTAG" \
              --verify-tag \
              --latest \
              --title "Release: $SUMMARY" \
              --notes-file release_notes.md
          fi

  # Build the per-platform binaries and attach them to the release just cut.
  # Called directly rather than via release.published (GITHUB_TOKEN can't fire
  # that event into another workflow).
  build-binaries:
    needs: [resolve, tag-and-release]
    permissions:
      contents: write
    uses: ./.github/workflows/release-jaclang.yml
    with:
      tag: v${{ needs.resolve.outputs.version }}

  summary:
    needs: [resolve, tag-and-release, build-binaries]
    if: always() && needs.resolve.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Release summary
        env:
          SUMMARY: ${{ needs.resolve.outputs.summary }}
          RELEASE: ${{ needs.tag-and-release.result }}
          BINARIES: ${{ needs.build-binaries.result }}
        run: |
          {
            echo "## Release: $SUMMARY"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Tag + GitHub Release | $RELEASE |"
            echo "| Native binaries | $BINARIES |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$RELEASE" != "success" ] || [ "$BINARIES" != "success" ]; then
            echo "::error::Release did not complete (tag/release: $RELEASE, binaries: $BINARIES)"
            exit 1
          fi
