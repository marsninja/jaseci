name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual re-publish: if the auto-trigger run failed partway (e.g. a build
  # error after the release/* PR was already merged), re-fire publishing for
  # selected packages. Versions are read from each package's manifest on the
  # current ref - no need to re-merge a release/* PR. Tier ordering and the
  # "already on PyPI" skip still apply, so re-running is safe.
  workflow_dispatch:
    inputs:
      # jaclang is no longer published to PyPI -- it ships as the native `jac`
      # binary (see release-jaclang.yml). Plugins below still publish to PyPI.
      jac-byllm:
        description: "Publish jac-byllm (byllm)"
        type: boolean
        default: false
      jac-scale:
        description: "Publish jac-scale"
        type: boolean
        default: false
      jac-mcp:
        description: "Publish jac-mcp"
        type: boolean
        default: false
      jaseci:
        description: "Publish jaseci meta-package"
        type: boolean
        default: false

permissions: {}

jobs:
  # ============================================================================
  # Parse release info from merged PR
  # ============================================================================
  parse-release:
    if: |
      github.repository == 'Jaseci-Labs/jaseci' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/')
        )
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has_releases: ${{ steps.parse.outputs.has_releases }}
      matrix: ${{ steps.parse.outputs.matrix }}
      release_summary: ${{ steps.parse.outputs.release_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Parse release info
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          # Collect the checked packages (empty string when unchecked).
          IN_BYLLM: ${{ inputs['jac-byllm'] && 'jac-byllm' || '' }}
          IN_SCALE: ${{ inputs['jac-scale'] && 'jac-scale' || '' }}
          IN_MCP: ${{ inputs['jac-mcp'] && 'jac-mcp' || '' }}
          IN_JASECI: ${{ inputs.jaseci && 'jaseci' || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PACKAGES="$IN_BYLLM $IN_SCALE $IN_MCP $IN_JASECI"
            echo "Manual dispatch - selected packages: $PACKAGES"
            jac run scripts/parse_release.jac --packages "$PACKAGES"
          else
            jac run scripts/parse_release.jac --pr-title "$PR_TITLE"
          fi

  # ============================================================================
  # Approval gate - ONE click to approve all publishing
  # ============================================================================
  approve-release:
    needs: parse-release
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: pypi
    timeout-minutes: 60
    steps:
      - name: Approval granted
        env:
          SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
        run: |
          echo "Release approved: $SUMMARY"
          echo "Proceeding with publish..."

  # ============================================================================
  # Build packages
  # ============================================================================
  build:
    needs: [parse-release, approve-release]
    if: |
      needs.parse-release.outputs.has_releases == 'true' &&
      needs.approve-release.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: ${{ matrix.submodules }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Set up additional Python versions so plugin wheels precompile bytecode for each.
      - name: Set up Python 3.13 (for precompile)
        if: matrix.precompile == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Python 3.14 (for precompile)
        if: matrix.precompile == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Build the jac binary (used by `jac bundle` + extra build commands).
      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      # Install the package itself for extra build commands.
      # Plugins have no pyproject.toml (jac.toml is the source of truth), so use `jac install`.
      - name: Install package (for build commands)
        if: matrix.extra_build_cmd != ''
        run: jac install -e ./${{ matrix.dir }}

      # Install extra pip dependencies for build commands (a sibling plugin a build step needs)
      - name: Install extra build dependencies
        if: matrix.extra_build_deps != ''
        run: jac install -e ./${{ matrix.extra_build_deps }}

      # Set up Node.js for packages that need it (e.g., admin UI build)
      - name: Set up Node.js (for client builds)
        if: matrix.needs_nodejs == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun (for client builds)
        if: matrix.needs_nodejs == true
        uses: oven-sh/setup-bun@v2

      # Run extra build commands (e.g., bundle_docs for jac-mcp, build_admin_ui for jac-scale)
      - name: Run extra build commands
        if: matrix.extra_build_cmd != ''
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.extra_build_cmd }}

      # Build the package with `jac bundle`, which reads jac.toml as the source of
      # truth. Plugins precompile against jaclang from the local source tree, not
      # PyPI (jaclang ships as the binary and is never published to PyPI).
      - name: Build plugin wheel
        working-directory: ${{ matrix.dir }}
        env:
          JAC_PRECOMPILE_LOCAL_INSTALL: ${{ github.workspace }}/jac
          # Precompile a sibling plugin from local source so its not-yet-published
          # version pin resolves without PyPI.
          JAC_PRECOMPILE_LOCAL_DEPS: ${{ matrix.extra_build_deps != '' && format('{0}/{1}', github.workspace, matrix.extra_build_deps) || '' }}
        run: jac bundle ${{ matrix.precompile == true && '--precompile' || '' }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: ${{ matrix.dir }}/dist/*

  # ============================================================================
  # Publish npm packages (npmjs.org) - independent of the PyPI tiers.
  # A package opts in with an [npm] section in its jac.toml. The Jac client
  # runtime (@jaseci/runtime) is versioned to jaclang and published from the
  # binary release workflow (release-jaclang.yml), not here.
  # ============================================================================
  publish-npm:
    needs: [parse-release, build]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # This package opts into npm publishing if its jac.toml has an [npm] section.
      - name: Determine npm work
        id: npm
        run: |
          PKG=false
          if [ -f "${{ matrix.dir }}/jac.toml" ] && grep -qE '^\[npm\]' "${{ matrix.dir }}/jac.toml"; then PKG=true; fi
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.npm.outputs.pkg == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        if: steps.npm.outputs.pkg == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up jac (build the binary)
        if: steps.npm.outputs.pkg == 'true'
        uses: ./.github/actions/setup-jac

      # Publish an opt-in package's npm tarball.
      - name: Build and publish npm package
        if: steps.npm.outputs.pkg == 'true'
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          jac bundle --target npm
          npm publish dist/*.tgz --access public

  # ============================================================================
  # Publish Tier 2: the plugins (byllm, jac-scale, jac-mcp). jaclang is the host
  # binary, not a PyPI tier, so the plugins are the first published tier.
  # ============================================================================
  publish-tier2:
    needs: [parse-release, build]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 2
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "2" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier2:
    needs: [parse-release, publish-tier2]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Wait for tier 2 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 2

  # ============================================================================
  # Publish Tier 3: plugins that depend on a tier-2 plugin (currently none)
  # ============================================================================
  publish-tier3:
    needs: [parse-release, build, wait-tier2]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-release.outputs.matrix) }}
    steps:
      - name: Check if tier 3
        id: check
        run: |
          if [[ "${{ matrix.tier }}" != "3" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download package
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: Packages-${{ matrix.pypi }}
          path: dist

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          # Idempotent re-runs: a manual re-publish (or rerun after a partial
          # failure) skips versions already on PyPI instead of erroring.
          skip-existing: true

  wait-tier3:
    needs: [parse-release, publish-tier3]
    if: needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Wait for tier 3 on PyPI
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
        run: jac run scripts/wait_for_pypi.jac --matrix "$MATRIX" --tier 3

  # ============================================================================
  # Push tags after successful publish
  # ============================================================================
  push-tags:
    needs: [parse-release, publish-tier2, publish-tier3]
    if: |
      always() &&
      needs.parse-release.outputs.has_releases == 'true' &&
      (needs.publish-tier2.result == 'success' || needs.publish-tier3.result == 'success')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push tags
        id: tags
        env:
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
          TIER2_RESULT: ${{ needs.publish-tier2.result }}
          TIER3_RESULT: ${{ needs.publish-tier3.result }}
        run: |
          echo "$MATRIX" | jq -c '.include[]' | while read -r pkg; do
            pypi_name=$(echo "$pkg" | jq -r '.pypi')
            version=$(echo "$pkg" | jq -r '.version')
            tier=$(echo "$pkg" | jq -r '.tier')

            case "$tier" in
              2) result="$TIER2_RESULT" ;;
              3) result="$TIER3_RESULT" ;;
            esac

            if [[ "$result" == "success" ]]; then
              tag="${pypi_name}-v${version}"
              echo "Creating tag: $tag"
              git tag --annotate --message="Release ${pypi_name} ${version}" "$tag" "$GITHUB_SHA"
              git push origin "$tag"
            else
              echo "Skipping tag for $pypi_name (tier $tier result: $result)"
            fi
          done

  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-github-release:
    needs: [parse-release, push-tags]
    if: always() && needs.push-tags.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: Packages-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MATRIX: ${{ needs.parse-release.outputs.matrix }}
          RELEASE_SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
        run: |
          # Tag the release off the first published package.
          PRIMARY_TAG=$(echo "$MATRIX" | jq -r '.include[0] | "\(.pypi)-v\(.version)"')

          # Build release notes
          {
            echo "## Packages Released"
            echo ""
            while read -r pkg; do
              pypi_name=$(echo "$pkg" | jq -r '.pypi')
              version=$(echo "$pkg" | jq -r '.version')
              echo "- **${pypi_name}** ${version} ([PyPI](https://pypi.org/project/${pypi_name}/${version}/))"
            done < <(echo "$MATRIX" | jq -c '.include[]')
          } > release_notes.md

          # Create release
          gh release create "$PRIMARY_TAG" \
            --verify-tag \
            --title "Release: $RELEASE_SUMMARY" \
            --notes-file release_notes.md \
            dist/*

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    needs: [parse-release, build, publish-tier2, publish-tier3, wait-tier3, push-tags, create-github-release]
    if: always() && needs.parse-release.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Release Summary
        env:
          SUMMARY: ${{ needs.parse-release.outputs.release_summary }}
          BUILD: ${{ needs.build.result }}
          TIER2: ${{ needs.publish-tier2.result }}
          TIER3: ${{ needs.publish-tier3.result }}
          TAGS: ${{ needs.push-tags.result }}
          RELEASE: ${{ needs.create-github-release.result }}
        run: |
          {
            echo "## Release Summary: $SUMMARY"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Build | $BUILD |"
            echo "| Publish Tier 2 (plugins) | $TIER2 |"
            echo "| Publish Tier 3 | $TIER3 |"
            echo "| Push Tags | $TAGS |"
            echo "| GitHub Release | $RELEASE |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$TIER2" == "failure" || "$TIER3" == "failure" ]]; then
            echo "::error::Some packages failed to publish"
            exit 1
          fi

          echo "All packages published successfully!" >> "$GITHUB_STEP_SUMMARY"
