name: Test Installer

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - ".github/workflows/test-installer.yml"
  workflow_dispatch:

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-installer:
    name: Test the standalone install
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v5

      # install.sh downloads the prebuilt `jac` binary (built + attached to the
      # GitHub Release by release-jaclang.yml) -- no system Python, uv, or pip.
      - name: ShellCheck install.sh
        run: shellcheck scripts/install.sh

      - name: "install: latest jac binary"
        run: bash scripts/install.sh

      - name: "install: verify jac on PATH"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          which jac
          jac --version

      - name: "install: run a test program (no system Python)"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo 'with entry { print("hello from the jac binary"); }' > /tmp/test_install.jac
          env -i HOME="$HOME" PATH=/usr/bin:/bin:"$HOME/.local/bin" jac run /tmp/test_install.jac | grep -q "hello from the jac binary"

      - name: "install: uninstall"
        run: bash scripts/install.sh --uninstall

      - name: "install: verify uninstall"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if command -v jac &>/dev/null; then
            echo "FAIL: jac still found after uninstall"
            exit 1
          fi
          echo "PASS: jac removed"
