<svg xmlns="http://www.w3.org/2000/svg" width="880" height="472" viewBox="0 0 880 472" role="img" aria-label="Diagram: in a best-practice stack one value crosses six artifacts in five notations with no checker spanning the seams; in Jac one declaration serves server, browser, and native code under one compiler, with memory discipline a dial and network physics still visible">
  <style>
    .sans { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    .fg { fill: #e6edf3; }
    .dim { fill: #8b949e; }
    .acc { fill: #ff9100; }
  </style>

  <!-- ============ Top panel: the conventional stack ============ -->
  <rect x="16" y="16" width="848" height="224" rx="12" fill="#161b22" stroke="#30363d"/>
  <text class="sans acc" x="32" y="44" font-size="13" font-weight="bold" letter-spacing="1">A BEST-PRACTICE STACK</text>
  <text class="sans dim" x="848" y="44" font-size="11.5" text-anchor="end">one value, database to pixels</text>

  <!-- jurisdiction islands (dashed) -->
  <g fill="none" stroke="#8b949e" stroke-dasharray="4 3">
    <rect x="42" y="100" width="126" height="72" rx="6"/>
    <rect x="176" y="100" width="260" height="72" rx="6"/>
    <rect x="578" y="100" width="260" height="72" rx="6"/>
  </g>
  <g class="sans dim" font-size="10" text-anchor="middle">
    <text x="105" y="92">DDL checker</text>
    <text x="306" y="92">Python checker</text>
    <text x="708" y="92">TypeScript compiler</text>
  </g>
  <text class="sans acc" x="507" y="92" font-size="10" text-anchor="middle" font-weight="bold">no checker</text>

  <!-- the six artifacts -->
  <g font-size="11" text-anchor="middle" class="sans fg">
    <rect x="50" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="105" y="130">SQL column</text>
    <rect x="184" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="239" y="130">ORM model</text>
    <rect x="318" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="373" y="130">serializer</text>
    <rect x="452" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="507" y="130">OpenAPI doc</text>
    <rect x="586" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="641" y="130">client type</text>
    <rect x="720" y="110" width="110" height="32" rx="6" fill="#21262d" stroke="#30363d"/><text x="775" y="130">JSX binding</text>
  </g>
  <g class="sans dim" font-size="10" text-anchor="middle">
    <text x="105" y="160">SQL</text>
    <text x="239" y="160">Python</text>
    <text x="373" y="160">Python</text>
    <text x="507" y="160">YAML</text>
    <text x="641" y="160">TypeScript</text>
    <text x="775" y="160">JSX</text>
  </g>

  <!-- seam arrows: accent = crosses a jurisdiction boundary -->
  <g stroke-width="1.8">
    <line x1="162" y1="126" x2="176" y2="126" stroke="#ff9100"/><path d="M176,122 L183,126 L176,130 Z" fill="#ff9100"/>
    <line x1="296" y1="126" x2="310" y2="126" stroke="#8b949e"/><path d="M310,122 L317,126 L310,130 Z" fill="#8b949e"/>
    <line x1="430" y1="126" x2="444" y2="126" stroke="#ff9100"/><path d="M444,122 L451,126 L444,130 Z" fill="#ff9100"/>
    <line x1="564" y1="126" x2="578" y2="126" stroke="#ff9100"/><path d="M578,122 L585,126 L578,130 Z" fill="#ff9100"/>
    <line x1="698" y1="126" x2="712" y2="126" stroke="#8b949e"/><path d="M712,122 L719,126 L712,130 Z" fill="#8b949e"/>
  </g>

  <text class="mono acc" x="440" y="198" font-size="11.5" text-anchor="middle">the seams are checked by nothing &#8212; the whole-program type checker is grep</text>
  <text class="sans dim" x="440" y="220" font-size="11" text-anchor="middle">12 notations &#183; 5 package ecosystems &#183; 4 copies of every record &#183; a specialist per boundary</text>

  <!-- ============ Bottom panel: Jac ============ -->
  <rect x="16" y="256" width="848" height="200" rx="12" fill="#161b22" stroke="#30363d"/>
  <text class="mono acc" x="32" y="284" font-size="13" font-weight="bold">jac</text>

  <!-- single jurisdiction -->
  <rect x="38" y="292" width="804" height="126" rx="8" fill="none" stroke="#8b949e" stroke-dasharray="4 3"/>
  <text class="sans dim" x="834" y="288" font-size="10" text-anchor="end">one compiler&#8217;s jurisdiction</text>

  <!-- one declaration -->
  <rect x="56" y="306" width="250" height="58" rx="6" fill="#21262d" stroke="#30363d"/>
  <text class="mono fg" x="72" y="330" font-size="12">node Profile {</text>
  <text class="mono fg" x="72" y="348" font-size="12">&#160;&#160;&#160;&#160;has bio: str; }</text>
  <text class="sans dim" x="181" y="382" font-size="10.5" text-anchor="middle">declared once</text>

  <!-- fan-out arrows -->
  <g stroke="#ff9100" stroke-width="1.8" fill="none">
    <line x1="306" y1="330" x2="486" y2="315"/><path d="M486,311 L494,315 L487,319 Z" fill="#ff9100"/>
    <line x1="306" y1="336" x2="486" y2="353"/><path d="M486,349 L494,353 L487,357 Z" fill="#ff9100"/>
    <line x1="306" y1="342" x2="486" y2="391"/><path d="M486,387 L494,391 L487,395 Z" fill="#ff9100"/>
  </g>

  <!-- the three substrates -->
  <g font-size="11.5" class="sans fg">
    <rect x="498" y="300" width="300" height="30" rx="6" fill="#21262d" stroke="#30363d"/><text x="514" y="319">server &#8212; Python bytecode &#183; PyPI</text>
    <rect x="498" y="338" width="300" height="30" rx="6" fill="#21262d" stroke="#30363d"/><text x="514" y="357">browser &#8212; JavaScript &#183; npm</text>
    <rect x="498" y="376" width="300" height="30" rx="6" fill="#21262d" stroke="#30363d"/><text x="514" y="395">native &#8212; machine code &#183; C ABI</text>
  </g>

  <text class="sans dim" x="440" y="434" font-size="11" text-anchor="middle">rename the field: every stale use &#8212; server, client, native &#8212; is a compile error</text>
  <text class="mono dim" x="440" y="450" font-size="10.5" text-anchor="middle">memory is a dial: GC by default &#183; own / &amp; / &amp;mut by choice&#160;&#160;&#8226;&#160;&#160;physics stays visible: async &#183; typed conflicts &#183; grant</text>
</svg>
