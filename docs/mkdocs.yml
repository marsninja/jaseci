theme:
  logo: "assets/logo.png"
  name: "material"
  custom_dir: overrides
  palette:
    scheme: "slate"
    primary: "black"
    accent: "orange"
  font:
    text: "Roboto"
    code: "Roboto Mono"
  features:
    - content.code.copy
    - content.action.edit
    - content.action.view
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.footer
    - navigation.top
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: material/fire
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

markdown_extensions:

  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      pygments_style: "autumn"
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".", "../"]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.blocks.caption
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - tables

  - toc:
        permalink: "#"


extra_css:
  - extra.css

extra:
  generator: false
  analytics:
    provider: google
    property: G-PLSMBEBC20
copyright: Copyright &copy; 2026 Jac Hackers Everywhere

# The runnable-code stack (Pyodide, Monaco, viz.js, run-code.js) is injected
# per-page by overrides/main.html for pages with `runnable_blocks: true`.
extra_javascript:
  - js/feedback.js
  - js/logo.js

plugins:
  - search
  - open-in-new-tab

hooks:
  - scripts/handle_jac_compile_data.py
