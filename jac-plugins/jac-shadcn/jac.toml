[project]
name = "jac-shadcn"
version = "0.1.0"
description = "Shadcn-style UI components for Jac"
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10"

[project.include]
packages = ["jac_shadcn*"]

[project.include.data]
jac_shadcn = ["templates/**/*", "templates/**/.*"]

[dependencies]
jaclang = ">=0.11.1"
"jac-client" = ">=0.1.0"

[entrypoints.jac]
shadcn = "jac_shadcn.plugin:JacShadcnPlugin"
