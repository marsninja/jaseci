[project]
name = "{{name}}"
version = "0.1.0"
description = "A Jac desktop application: {{name}}"
entry-point = "main.jac"
kind = "desktop"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.desktop]
name = "{{name}}"
identifier = "com.example.{{name}}"
version = "1.0.0"

[jacpack]
name = "desktop"
description = "Jac desktop app (OS webview + nacompile)"
jaclang = "0.9.8"

[jacpack.options]
directories = ["components", "assets", ".jac/client"]
post_create_hook = "jaclang.runtimelib.client.plugin_config:_post_create_client"
