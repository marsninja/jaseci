[project]
name = "{{name}}"
version = "0.1.0"
description = "A full-stack Jac application"
entry-point = "main.jac"
kind = "web-app"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.7"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[jacpack]
name = "web-app"
description = "Minimal full-stack Jac app (server walkers + client UI)"
jaclang = "0.9.8"

[jacpack.options]
directories = [".jac", "assets"]
post_create_hook = "jaclang.runtimelib.client.plugin_config:_post_create_client"
