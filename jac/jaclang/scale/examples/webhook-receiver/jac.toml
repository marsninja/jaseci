[project]
name = "webhook-receiver-example"
version = "1.0.0"
description = "Signed webhook receiver example for jac-scale"
entry-point = "app.jac"

[plugins.scale.webhook]
# Reject signed requests whose timestamp is older than this window.
replay_tolerance_seconds = 300
# Reject bodies larger than 1 MiB.
max_body_bytes = 1048576
# 0 disables the per-process rate check.
rate_limit_per_minute = 0
# Default expiry for new api keys (0 = permanent).
api_key_expiry_days = 0
