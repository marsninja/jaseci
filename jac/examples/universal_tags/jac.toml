[project]
name = "universal-tags"
version = "1.0.0"
client_kind = "universal"
description = "Universal Tag System showcase: a @jac/ui vocabulary app (one source, web + React Native)"
entry-point = "main.jac"

[plugins.client]

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
# react-native-web backs the @jac/ui vocabulary on the web target; the native
# target uses real react-native. See the jac-client reference (React Native target).
react-native-web = "^0.19.13"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
