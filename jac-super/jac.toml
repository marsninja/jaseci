[project]
name = "jac-super"
version = "0.1.22"
description = "AI agent TUI for the Jac CLI"
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
maintainers = [{ name = "Jason Mars", email = "jason@mars.ninja" }]
license = "MIT"
readme = "README.md"
keywords = ["jac", "jaclang", "jaseci", "ai", "agent", "tui", "cli"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-super"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-super.md"

[project.include]
packages = ["jac_super*"]

[dependencies]
jaclang = ">=0.16.4"

[entrypoints.jac]
ai = "jac_super.ai_agent.plugin:JacSuperAiPlugin"
